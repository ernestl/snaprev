name: revmap
title: revmap
base: bare
build-base: core24
adopt-info: revmap
summary: Inspect snap revision and version history
description: |
  A CLI tool for inspecting the revision and version
  history of snaps published in the Snap Store.
confinement: strict
license: GPL-3.0
contact: https://github.com/ernestl/revmap/issues
source-code: https://github.com/ernestl/revmap
issues: https://github.com/ernestl/revmap/issues
website: https://github.com/ernestl/revmap#readme

parts:
  revmap:
    plugin: nil
    source: .
    source-type: git
    source-depth: 0
    build-snaps:
      - go/latest/stable
    override-pull: |
      craftctl default
      craftctl set version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
    override-build: |
      VERSION=$(craftctl get version)
      CGO_ENABLED=0 go build -ldflags "-X main.version=${VERSION}" \
        -o ${CRAFT_PART_INSTALL}/bin/revmap .
      install -m 755 demo.sh ${CRAFT_PART_INSTALL}/bin/demo.sh

apps:
  revmap:
    command: bin/revmap
    plugs:
      - network
